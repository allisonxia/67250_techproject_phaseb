<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Allison Xia">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <title>MonoMuse</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <div class="container"> 
    <header class="header">

    <nav class="nav_bar">

    <main class="main">
    <table>
            <label for="name">Name (Required): </label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email (Required): </label><br>
            <input type="text" id="email" name="email" required><br><br>

            <label for="quantity">Ticket Quantity (Required): </label><br>
            <input type="number" id="quantity" name="quantity" min="1" required><br><br>

            <button type="submit">Submit</button>
       </table>
